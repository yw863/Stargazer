    <!-- Google Fonts: preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      字体引入说明：
      · EB Garamond     — 副标题「Do Look Up——」，古典衬线
      · Spectral        — 展示字体（事件名），优雅衬线
      · DM Sans         — 正文 / UI 标签，轻量无衬线
      · Geist Mono      — 数字读数（星等、距离、角距、时间等所有纯数字）
      · Noto Serif SC   — 中文衬线字体（思源宋体 Google Fonts 版本）
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Geist+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
